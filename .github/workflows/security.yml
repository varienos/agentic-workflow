name: Security Scan

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GitHub Organization kullaniliyorsa lisans gerekli:
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: npm audit
        working-directory: Agentbase
        run: |
          npm install --production
          npm audit --production --audit-level=high || {
            echo "::warning::npm audit high+ vulnerability tespit edildi"
            exit 1
          }
