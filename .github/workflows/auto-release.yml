name: Otomatik Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    # CHANGELOG bot commit'lerinde ve release commit'lerinde calisma
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !startsWith(github.event.head_commit.message, 'release:') &&
      !startsWith(github.event.head_commit.message, 'docs: CHANGELOG') &&
      !startsWith(github.event.head_commit.message, 'chore: release')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: Son tag'den bu yana commit var mi?
        id: check
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            echo "commits=true" >> $GITHUB_OUTPUT
            echo "count=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
          else
            COUNT=$(git rev-list --count ${LATEST_TAG}..HEAD)
            echo "commits=$([ $COUNT -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
          fi
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Bump tipi tespit et
        if: steps.check.outputs.commits == 'true'
        id: bump
        env:
          TAG: ${{ steps.check.outputs.tag }}
        run: |
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const { spawnSync } = require('child_process');
          const { detectBump, parseGitLogMessages } = require('./Agentbase/bin/release.js');

          const tag = process.env.TAG;
          const args = ['log', '--pretty=format:%s%x1f%b%x1e', '--no-merges'];
          if (tag) {
            args.push(`${tag}..HEAD`);
          }

          const result = spawnSync('git', args, { encoding: 'utf8' });
          if (result.status !== 0) {
            process.stderr.write(result.stderr || 'git log failed');
            process.exit(result.status);
          }

          const commits = parseGitLogMessages(result.stdout);
          process.stdout.write(`type=${detectBump(commits)}\n`);
          NODE

      - name: Release yap
        if: steps.check.outputs.commits == 'true'
        working-directory: Agentbase
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          node bin/release.js ${{ steps.bump.outputs.type }}
