name: Tests

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'Agentbase/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Bagimliklar
        working-directory: Agentbase
        run: npm ci

      - name: Testler
        working-directory: Agentbase
        run: npm test
